# Phase L1a — Cloudflare Worker config for the Research Assistant license
# server. Free-tier-only (Workers + D1 + Cron). The user fills in
# `database_id` after running `wrangler d1 create research-license`; see
# ./README.md for the full bring-up sequence.
name = "research-assistant-license"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# Sensitive values live in Wrangler secrets, not here:
#   wrangler secret put ADMIN_TOKEN
#   wrangler secret put RESEND_API_KEY
#   wrangler secret put LEMONSQUEEZY_WEBHOOK_SECRET

[vars]
ENV = "production"
# Resend's free shared sender — works immediately, no DNS setup.
# Swap to "no-reply@<your-verified-domain>" once your launch domain
# is added + verified in the Resend dashboard.
RESEND_FROM = "onboarding@resend.dev"
APP_DOWNLOAD_URL = "https://research-assistant-bn5.pages.dev/install"
APP_BASE_URL = "https://research-assistant-bn5.pages.dev"

[[d1_databases]]
binding = "DB"
database_name = "research-license"
database_id = "39b25942-a222-47e2-93aa-13f11482a944"
migrations_dir = "src/db/migrations"
